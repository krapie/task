name: CI

on:
  push:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push task-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: krapi0314/task-api:${{ steps.tag.outputs.IMAGE_TAG }}

  build-web:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push task-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: krapi0314/task-web:${{ steps.tag.outputs.IMAGE_TAG }}

  deploy:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homeserver repo
        uses: actions/checkout@v4
        with:
          repository: krapie/homeserver
          token: ${{ secrets.GITOPS_TOKEN }}
          path: homeserver

      - name: Update image tags in deployment manifests
        env:
          IMAGE_TAG: ${{ needs.build-api.outputs.image_tag }}
        run: |
          sed -i "s|krapi0314/task-api:.*|krapi0314/task-api:${IMAGE_TAG}|" \
            homeserver/k8s/task/deployment-api.yaml
          sed -i "s|krapi0314/task-web:.*|krapi0314/task-web:${IMAGE_TAG}|" \
            homeserver/k8s/task/deployment-web.yaml

      - name: Commit and push manifest updates
        env:
          IMAGE_TAG: ${{ needs.build-api.outputs.image_tag }}
        run: |
          cd homeserver
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/task/deployment-api.yaml k8s/task/deployment-web.yaml
          git commit -m "deploy: task ${{ env.IMAGE_TAG }}"
          git push
